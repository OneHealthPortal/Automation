name: Update Files

on:
  schedule:
    # Every Sunday at 19:17 UTC
    - cron: '17 19 * * 0'

  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas
        pip install numpy
        pip install requests
        pip install PyGithub==1.58.0

    - name: Run updater
      env:
        PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
      run: |
        python update_files.py
